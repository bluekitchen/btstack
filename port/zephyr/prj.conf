# Console output is opt-in via debug-usb.conf or debug-segger.conf.
CONFIG_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_NEWLIB_LIBC=y

CONFIG_I2C=n
CONFIG_WATCHDOG=n
CONFIG_SPI=n
CONFIG_SERIAL=n

CONFIG_PM=n

CONFIG_DYNAMIC_INTERRUPTS=n
CONFIG_IRQ_OFFLOAD=n

CONFIG_BOOT_BANNER=n
CONFIG_BOOT_DELAY=0

CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_ARM_MPU=n

CONFIG_BT=y
CONFIG_BT_HCI_RAW=y

# Setup connections
CONFIG_BT_MAX_CONN=16

# Setup CMD and Event buffer
CONFIG_BT_BUF_CMD_TX_SIZE=255
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255
# CONFIG_BT_BUF_EVT_RX_COUNT must be greater than CONFIG_BT_BUF_ACL_TX_COUNT
CONFIG_BT_BUF_EVT_RX_COUNT=16

# Default to LE Data Length Extension sized ACL buffers. Dual-mode boards can
# override this in their board-specific configuration.
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=10

#CONFIG_BT_CTLR_DTM_HCI=y
CONFIG_BT_ISO_BROADCASTER=y

CONFIG_BT_RX_STACK_SIZE=1024
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=640
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
#CONFIG_MPSL_WORK_STACK_SIZE=640
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=128
CONFIG_ISR_STACK_SIZE=1024

#CONFIG_THREAD_ANALYZER=y
#CONFIG_THREAD_ANALYZER_USE_PRINTK=y
#CONFIG_THREAD_ANALYZER_AUTO=y
#CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=5
#CONFIG_THREAD_NAME=y

# Workaround: Unable to allocate command buffer when using K_NO_WAIT since
# Host number of completed commands does not follow normal flow control.
#CONFIG_BT_BUF_CMD_TX_COUNT=10
