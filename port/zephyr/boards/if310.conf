# Config persistent BTstack TLV storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

CONFIG_I2C=n
CONFIG_WATCHDOG=n
CONFIG_SPI=n

CONFIG_PM=n

CONFIG_DYNAMIC_INTERRUPTS=n
CONFIG_IRQ_OFFLOAD=n

CONFIG_BOOT_BANNER=n
CONFIG_BOOT_DELAY=0

CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_ARM_MPU=n

# BTstack uses Zephyr's raw HCI path and provides the host stack itself.
CONFIG_BT=y
CONFIG_BT_HCI_RAW=y

# HCI H:4 UART transport to the IF310 module.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Download CYW55310 PatchRAM at boot.
CONFIG_BT_AIROC_CUSTOM=y
CONFIG_AIROC_CUSTOM_FIRMWARE_HCD_BLOB="CYW55500A1_001.002.032.0233.0117.hcd"
CONFIG_AIROC_AUTOBAUD_MODE=y

# Setup connections
CONFIG_BT_MAX_CONN=16

# Setup CMD and Event buffer
CONFIG_BT_BUF_CMD_TX_SIZE=255
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255
CONFIG_BT_BUF_EVT_RX_COUNT=16

# IF310 uses a dual-mode controller, so use BR/EDR maximum sized ACL buffers.
CONFIG_BT_BUF_ACL_RX_SIZE=1021
CONFIG_BT_BUF_ACL_TX_SIZE=1021
CONFIG_BT_BUF_ACL_TX_COUNT=10

CONFIG_BT_ISO_BROADCASTER=y

CONFIG_BT_RX_STACK_SIZE=1024
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=640
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=128
CONFIG_ISR_STACK_SIZE=1024
