# HCI H:4 UART transport to the IF310 module.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Download CYW55310 PatchRAM at boot.
CONFIG_BT_AIROC_CUSTOM=y
CONFIG_AIROC_CUSTOM_FIRMWARE_HCD_BLOB="CYW55500A1_001.002.032.0211.0125.hcd"
CONFIG_AIROC_AUTOBAUD_MODE=y

# IF310 uses a dual-mode controller, so use BR/EDR maximum sized ACL buffers.
CONFIG_BT_BUF_ACL_RX_SIZE=1021
CONFIG_BT_BUF_ACL_TX_SIZE=1021

CONFIG_BT_ISO_BROADCASTER=y
CONFIG_MAIN_STACK_SIZE=8192
