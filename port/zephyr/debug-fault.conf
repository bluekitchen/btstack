# Extra diagnostics for debugging faults with a debugger or console.
CONFIG_FAULT_DUMP=2
CONFIG_ASSERT=y
CONFIG_THREAD_NAME=y
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y

# Zephyr's ARM fault paths use LOG_ERR, so route logs immediately to RTT.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_DEFAULT_LEVEL=3
